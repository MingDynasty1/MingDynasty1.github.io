    <script>
        // 验证码生成
        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 120;
            canvas.height = 40;
            
            ctx.fillStyle = '#FFFFF0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.strokeStyle = `rgba(${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, 0.5)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, 0.5)`;
                ctx.fill();
            }
            
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            let captchaText = '';
            for (let i = 0; i < 4; i++) {
                captchaText += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            ctx.font = 'bold 24px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let i = 0; i < captchaText.length; i++) {
                const char = captchaText.charAt(i);
                const x = 20 + i * 25;
                const y = canvas.height / 2;
                const angle = (Math.random() - 0.5) * 0.5;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                const colors = ['#A62424', '#4B6C54', '#3B5998', '#8B4513', '#6B4226'];
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }
            
            canvas.dataset.captcha = captchaText;
            return captchaText;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            generateCaptcha();
            
            document.getElementById('captchaCanvas').addEventListener('click', generateCaptcha);
            
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });

            const form = document.getElementById('registrationForm');
            
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                clearErrors();
                
                let isValid = true;
                
                const username = document.getElementById('username').value.trim();
                if (username.length < 3) {
                    showError('usernameError', '用户名至少需要3个字符');
                    isValid = false;
                }
                
                const password = document.getElementById('password').value;
                if (password.length < 6) {
                    showError('passwordError', '密码至少需要6个字符');
                    isValid = false;
                }
                
                const confirmPassword = document.getElementById('confirmPassword').value;
                if (password !== confirmPassword) {
                    showError('confirmPasswordError', '两次输入的密码不一致');
                    isValid = false;
                }
                
                const email = document.getElementById('email').value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('emailError', '请输入有效的电子邮箱地址');
                    isValid = false;
                }
                
                const captcha = document.getElementById('captcha').value.trim();
                const canvasCaptcha = document.getElementById('captchaCanvas').dataset.captcha;
                if (captcha.toLowerCase() !== canvasCaptcha.toLowerCase()) {
                    showError('captchaError', '验证码不正确');
                    isValid = false;
                }
                
                const terms = document.getElementById('terms');
                if (!terms.checked) {
                    showError('termsError', '请阅读并同意用户协议和隐私政策');
                    isValid = false;
                }
                
                if (!isValid) return;

                // ===== 使用 Supabase 注册 =====
                const result = await registerUser(username, password, email);
                
                if (result.success) {
                    showSuccessModal();
                } else {
                    let errorMsg = result.error;
                    if (errorMsg.includes('already registered') || errorMsg.includes('User already registered')) {
                        errorMsg = '该邮箱已被注册，请直接登录';
                    }
                    showError('emailError', errorMsg);
                }
            });
        });

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            const progressBar = document.getElementById('progressBar');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            let width = 0;
            const interval = setInterval(function() {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(function() {
                        window.location.href = 'https://mingdynasty1.github.io/';
                    }, 500);
                } else {
                    width++;
                    progressBar.style.width = width + '%';
                }
            }, 30);
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
        }

        function clearErrors() {
            document.querySelectorAll('[id$="Error"]').forEach(el => el.classList.add('hidden'));
        }
    </script>
