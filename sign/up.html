    <div class="fixed inset-0 z-0 opacity-10 pointer-events-none">

<script>
// Cookie工具
const CookieUtil = {
    set(name, value, days = 30) {
        let d = new Date();
        d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=None;Secure`;
    },
    get(name) {
        let arr = document.cookie.match(new RegExp("(^| )" + name + "=([^;]*)(;|$)"));
        return arr ? decodeURIComponent(arr[2]) : null;
    }
};

// 生成6位激活码
function createCode() {
    return Math.floor(100000 + Math.random() * 900000).toString();
}

document.getElementById('registrationForm').addEventListener('submit',function(e){
    e.preventDefault();
    let username = document.getElementById('username').value.trim();
    let password = document.getElementById('password').value.trim();
    let email = document.getElementById('email').value.trim();

    // 简单校验
    if(username.length < 3) { alert('用户名至少3个字符'); return; }
    if(password.length < 6) { alert('密码至少6个字符'); return; }
    if(!/^\w+@\w+\.\w+$/.test(email)) { alert('邮箱格式错误'); return; }

    // 检测是否已注册
    if(CookieUtil.get('user_'+username)){
        alert('该用户名已注册');
        return;
    }

    // 生成激活码 + 10分钟过期
    let code = createCode();
    let expireTime = Date.now() + 10 * 60 * 1000;

    // 存入Cookie：未激活active=0
    let userInfo = {
        username: username,
        password: password,
        email: email,
        active: 0,
        code: code,
        expire: expireTime,
        lastResend: 0
    };
    CookieUtil.set('user_'+username, JSON.stringify(userInfo), 30);

    // 显示激活码
    document.getElementById('activeCode').innerText = code;
    document.getElementById('tipBox').classList.remove('hidden');
    this.reset();
});
</script>
