    <script>
        // 验证码生成
        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布尺寸
            canvas.width = 120;
            canvas.height = 40;
            
            // 背景
            ctx.fillStyle = '#FFFFF0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 添加干扰线
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.strokeStyle = `rgba(${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, 0.5)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // 添加干扰点
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, ${Math.floor(Math.random()*80+150)}, 0.5)`;
                ctx.fill();
            }
            
            // 生成验证码文本
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            let captchaText = '';
            for (let i = 0; i < 4; i++) {
                captchaText += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // 绘制验证码文本
            ctx.font = 'bold 24px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 为每个字符设置不同的颜色和旋转角度
            for (let i = 0; i < captchaText.length; i++) {
                const char = captchaText.charAt(i);
                const x = 20 + i * 25;
                const y = canvas.height / 2;
                
                // 随机旋转角度
                const angle = (Math.random() - 0.5) * 0.5;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                // 随机颜色
                const colors = ['#A62424', '#4B6C54', '#3B5998', '#8B4513', '#6B4226'];
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }
            
            // 存储验证码文本用于验证
            canvas.dataset.captcha = captchaText;
            
            return captchaText;
        }
        
        // 初始化验证码
        document.addEventListener('DOMContentLoaded', function() {
            generateCaptcha();
            
            // 点击验证码刷新
            document.getElementById('captchaCanvas').addEventListener('click', function() {
                generateCaptcha();
            });
            
            // 密码显示/隐藏切换
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
            
            // 表单验证
            const form = document.getElementById('registrationForm');
            
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                
                // 清除之前的错误信息
                clearErrors();
                
                // 验证表单
                let isValid = true;
                
                // 用户名验证
                const username = document.getElementById('username').value.trim();
                if (username.length < 3) {
                    showError('usernameError', '用户名至少需要3个字符');
                    isValid = false;
                }
                
                // 密码验证
                const password = document.getElementById('password').value;
                if (password.length < 6) {
                    showError('passwordError', '密码至少需要6个字符');
                    isValid = false;
                }
                
                // 确认密码验证
                const confirmPassword = document.getElementById('confirmPassword').value;
                if (password !== confirmPassword) {
                    showError('confirmPasswordError', '两次输入的密码不一致');
                    isValid = false;
                }
                
                // 邮箱验证
                const email = document.getElementById('email').value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('emailError', '请输入有效的电子邮箱地址');
                    isValid = false;
                }
                
                // 验证码验证
                const captcha = document.getElementById('captcha').value.trim();
                const canvasCaptcha = document.getElementById('captchaCanvas').dataset.captcha;
                if (captcha.toLowerCase() !== canvasCaptcha.toLowerCase()) {
                    showError('captchaError', '验证码不正确');
                    isValid = false;
                }
                
                // 同意条款验证
                const terms = document.getElementById('terms');
                if (!terms.checked) {
                    showError('termsError', '请阅读并同意用户协议和隐私政策');
                    isValid = false;
                }
                
                // 如果验证通过，显示成功弹窗
                if (isValid) {
                    showSuccessModal();
                }
            });
            
            // 实时验证
            document.getElementById('username').addEventListener('blur', function() {
                const username = this.value.trim();
                if (username.length > 0 && username.length < 3) {
                    showError('usernameError', '用户名至少需要3个字符');
                } else {
                    hideError('usernameError');
                }
            });
            
            document.getElementById('password').addEventListener('blur', function() {
                const password = this.value;
                if (password.length > 0 && password.length < 6) {
                    showError('passwordError', '密码至少需要6个字符');
                } else {
                    hideError('passwordError');
                }
            });
            
            document.getElementById('confirmPassword').addEventListener('blur', function() {
                const password = document.getElementById('password').value;
                const confirmPassword = this.value;
                if (confirmPassword.length > 0 && password !== confirmPassword) {
                    showError('confirmPasswordError', '两次输入的密码不一致');
                } else {
                    hideError('confirmPasswordError');
                }
            });
            
            document.getElementById('email').addEventListener('blur', function() {
                const email = this.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (email.length > 0 && !emailRegex.test(email)) {
                    showError('emailError', '请输入有效的电子邮箱地址');
                } else {
                    hideError('emailError');
                }
            });
            
            document.getElementById('captcha').addEventListener('blur', function() {
                const captcha = this.value.trim();
                const canvasCaptcha = document.getElementById('captchaCanvas').dataset.captcha;
                if (captcha.length > 0 && captcha.toLowerCase() !== canvasCaptcha.toLowerCase()) {
                    showError('captchaError', '验证码不正确');
                } else {
                    hideError('captchaError');
                }
            });
            
            document.getElementById('terms').addEventListener('change', function() {
                if (this.checked) {
                    hideError('termsError');
                }
            });
        });
        
        // 显示错误信息
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
        }
        
        // 隐藏错误信息
        function hideError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.classList.add('hidden');
        }
        
        // 清除所有错误信息
        function clearErrors() {
            const errorElements = document.querySelectorAll('[id$="Error"]');
            errorElements.forEach(function(element) {
                element.classList.add('hidden');
            });
        }
        
        // 显示成功弹窗
        // 替换原有的 showSuccessModal 函数
function showSuccessModal() {
    const modal = document.getElementById('successModal');
    const progressBar = document.getElementById('progressBar');
    
    // 获取表单数据
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const email = document.getElementById('email').value.trim();
    
    // 构建用户信息对象
    const userData = {
        username: username,
        password: password,
        email: email,
        registerTime: new Date().toISOString()
    };
    
    // 存储到 Register_user Cookie（有效期30天）
    setCookie('Register_user', JSON.stringify(userData), 30);
    
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    
    // 进度条动画
    let width = 0;
    const interval = setInterval(function() {
        if (width >= 100) {
            clearInterval(interval);
            // 跳转到登录页面
            setTimeout(function() {
                window.location.href = 'https://mingdynasty1.github.io/sign/in.html';
            }, 500);
        } else {
            width++;
            progressBar.style.width = width + '%';
        }
    }, 30);
}

// 添加 Cookie 操作函数（放在注册页面的 script 中）
function setCookie(name, value, days = 7) {
    const date = new Date();
    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
    const expires = "expires=" + date.toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; ${expires}; path=/; SameSite=Lax`;
}

function getCookie(name) {
    const nameEQ = `${name}=`;
    const cookies = document.cookie.split(';');
    for(let i = 0; i < cookies.length; i++) {
        let cookie = cookies[i];
        while (cookie.charAt(0) === ' ') cookie = cookie.substring(1);
        if (cookie.indexOf(nameEQ) === 0) {
            return decodeURIComponent(cookie.substring(nameEQ.length));
        }
    }
    return null;
}
