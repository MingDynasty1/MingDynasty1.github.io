<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大明登录 | MingDynasty</title>
    <link rel="icon" href="https://MingDynasty1.github.io/000000000000000000.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'ming-red': '#A62424',
                        'ming-gold': '#D4AF37',
                        'ming-ivory': '#FFFFF0',
                        'ming-black': '#2C2C2C',
                        'dark-bg': '#1A1A1A',
                        'dark-card': '#2D2D2D',
                        'dark-text': '#E0E0E0',
                        'dark-border': '#8B7355'
                    },
                    fontFamily: {
                        ming: ['SimSun', 'FangSong', 'serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .paper-texture {
                background-color: #FFFFF0;
                background-image: url("https://www.transparenttextures.com/patterns/old-paper.png");
            }
            .dark .paper-texture {
                background-color: #2D2D2D;
                background-image: url("https://www.transparenttextures.com/patterns/dark-wood.png");
            }
            .scroll-border {
                border-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0V40M40 0V40M0 0H40M0 40H40' stroke='%23D4AF37' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E") 8 repeat;
                border-width: 8px;
            }
            .seal-button {
                background: #A62424;
                color: #FFFFF0;
                border: 2px solid #8B0000;
                box-shadow: 0 4px 0 #6D0000;
                font-family: 'SimSun', serif;
                position: relative;
                transition: all 0.2s;
            }
            .seal-button:active {
                transform: translateY(4px);
                box-shadow: 0 0 0 #6D0000;
            }
            .seal-button::before {
                content: '';
                position: absolute;
                top: 2px;
                left: 2px;
                right: 2px;
                bottom: 2px;
                border: 1px solid rgba(255,255,240,0.3);
            }
            .input-paper {
                background: #FFFFF0;
                border: 1px solid #D4AF37;
                border-radius: 2px;
                padding: 8px;
                width: 100%;
                font-family: 'SimSun', serif;
                background-image: url("https://www.transparenttextures.com/patterns/old-paper.png");
            }
            .dark .input-paper {
                background: #2D2D2D;
                border-color: #8B7355;
                color: #E0E0E0;
            }
            .ming-title {
                text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
                letter-spacing: 4px;
            }
            .ming-decoration {
                background-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10C20 10 30 0 50 0C70 0 80 10 100 10' stroke='%23D4AF37' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
                background-repeat: repeat-x;
            }
        }
    </style>
</head>
<body class="bg-ming-ivory dark:bg-dark-bg font-ming min-h-screen relative">
    <!-- 背景暗纹 -->
    <div class="absolute inset-0 opacity-5 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/chinese-bamboo.png')]"></div>

    <main class="container mx-auto px-4 py-16 relative z-10">
        <!-- 明朝卷轴式登录框 -->
        <div class="max-w-lg mx-auto bg-ming-ivory dark:bg-dark-card rounded-lg shadow-2xl p-8 relative overflow-hidden paper-texture"
             style="box-shadow: 0 0 30px rgba(166, 36, 36, 0.1), 0 4px 20px rgba(0,0,0,0.15);">
            
            <!-- 顶部装饰 -->
            <div class="ming-decoration h-3 w-full mb-6"></div>

            <!-- 标题 -->
            <h2 class="text-3xl text-center text-ming-red dark:text-ming-gold font-bold mb-6 ming-title">大明用户登录</h2>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-ming-black dark:text-dark-text mb-2 text-lg font-bold">用户名</label>
                    <input type="text" id="username" class="input-paper text-lg py-3" placeholder="请输入用户名" required>
                </div>
                <div>
                    <label class="block text-ming-black dark:text-dark-text mb-2 text-lg font-bold">密码</label>
                    <input type="password" id="password" class="input-paper text-lg py-3" placeholder="请输入密码" required>
                </div>

                <!-- 印章式登录按钮 -->
                <button type="submit" class="seal-button w-full py-4 text-xl font-bold rounded-sm tracking-widest">
                    登 录
                </button>
            </form>

            <!-- 消息提示 -->
            <div id="msg" class="mt-5 text-center text-ming-red font-bold text-lg"></div>

            <!-- 分割纹样 -->
            <div class="ming-decoration h-2 w-full my-5"></div>

            <!-- 链接 -->
            <p class="text-center text-ming-black dark:text-dark-text text-lg">
                还没账号？<a href="https://mingdynasty1.github.io/sign/up.html" class="text-ming-red hover:underline font-bold">立即注册</a>
            </p>
            <p class="mt-3 text-center text-ming-red dark:text-ming-gold text-lg font-bold">
                <a href="https://mgdyqwq.github.io/check/index.html" class="hover:underline">前往激活账户</a>
            </p>

            <!-- 底部装饰 -->
            <div class="ming-decoration h-3 w-full mt-6 transform rotate-180"></div>
        </div>
    </main>

<script>
const CookieUtil = {
    set(name, value, days = 30) {
        let d = new Date();
        d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=None;Secure`;
    },
    get(name) {
        let arr = document.cookie.match(new RegExp("(^| )" + name + "=([^;]*)(;|$)"));
        return arr ? decodeURIComponent(arr[2]) : null;
    }
};

document.getElementById('loginForm').addEventListener('submit',function(e){
    e.preventDefault();
    let uname = document.getElementById('username').value.trim();
    let pwd = document.getElementById('password').value.trim();
    let msg = document.getElementById('msg');

    let userStr = CookieUtil.get('user_'+uname);
    if(!userStr){
        msg.innerText = '用户不存在';
        return;
    }
    let user = JSON.parse(userStr);
    if(user.password !== pwd){
        msg.innerText = '密码错误';
        return;
    }
    if(user.active !== 1){
        msg.innerText = '此账户未激活！请先去激活页面完成激活';
        return;
    }
    msg.innerText = '登录成功，正在跳转...';
    setTimeout(()=>{
        window.location.href = 'https://mingdynasty1.github.io';
    },1000);
});
</script>
</body>
</html>
