<body class="bg-ming-ivory dark:bg-dark-bg font-ming min-h-screen transition-colors duration-300">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 z-0 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-wood-pattern bg-cover dark:brightness-75"></div>
    </div>
    
    <!-- 顶部装饰 -->
    <div class="relative z-10 w-full">
        <div class="w-full h-16 bg-ming-red dark:bg-[#8B1A1A] shadow-lg flex items-center justify-center transition-colors duration-300">
            <div class="w-3/4 h-full border-b-4 border-ming-gold dark:border-dark-border flex items-center justify-center">
                <h1 class="text-3xl md:text-4xl text-ming-gold dark:text-[#C9B037] font-bold chinese-shadow">
                    大明王朝 - 用户登录
                </h1>
            </div>
        </div>
        
        <!-- 主题切换按钮 -->
        <div class="absolute top-4 right-4 z-20">
            <button id="themeToggle" class="seal-button py-1 px-3 text-sm flex items-center gap-2">
                <i class="fa fa-moon-o dark:hidden"></i>
                <i class="fa fa-sun-o hidden dark:block"></i>
                <span class="hidden sm:inline">切换主题</span>
            </button>
        </div>
        
        <!-- 装饰性云纹 -->
        <div class="relative h-16 w-full overflow-hidden">
            <div class="absolute -top-4 left-0 w-32 h-16 cloud-decoration transform -rotate-12"></div>
            <div class="absolute -top-2 left-1/4 w-24 h-16 cloud-decoration"></div>
            <div class="absolute -top-4 right-1/4 w-32 h-16 cloud-decoration transform rotate-12"></div>
            <div class="absolute -top-2 right-0 w-24 h-16 cloud-decoration transform rotate-6"></div>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <main class="relative z-20 container mx-auto px-4 py-8 md:py-16">
        <!-- 登录表单容器 -->
        <div class="max-w-2xl mx-auto bg-ming-ivory dark:bg-dark-card rounded-lg shadow-xl overflow-hidden border-2 border-ming-gold dark:border-dark-border slide-in transition-colors duration-300">
            <!-- 表单标题 -->
            <div class="relative bg-ming-red dark:bg-[#8B1A1A] py-6 px-8 text-center transition-colors duration-300">
                <h2 class="text-2xl md:text-3xl text-ming-gold dark:text-[#C9B037] font-bold chinese-shadow">
                    用户登录
                </h2>
                <div class="absolute top-0 left-0 w-full h-2 bg-ming-gold dark:bg-dark-border"></div>
                <div class="absolute bottom-0 left-0 w-full h-2 bg-ming-gold dark:bg-dark-border"></div>
            </div>
            
            <!-- 表单内容 -->
            <div class="p-6 md:p-8 paper-texture dark:text-dark-text">
                <form id="loginForm" class="space-y-6">
                    <!-- 用户名 -->
                    <div class="space-y-2">
                        <label for="username" class="block text-ming-black dark:text-dark-text text-lg">
                            用户名 <span class="text-ming-red">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-ming-black dark:text-dark-text">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" id="username" name="username" 
                                class="input-paper w-full pl-10 pr-4 py-2 text-ming-black dark:text-dark-text placeholder-gray-500 dark:placeholder-gray-400"
                                placeholder="请输入用户名" required>
                        </div>
                        <p id="usernameError" class="hidden text-ming-red text-sm"></p>
                    </div>
                    
                    <!-- 密码 -->
                    <div class="space-y-2">
                        <label for="password" class="block text-ming-black dark:text-dark-text text-lg">
                            密码 <span class="text-ming-red">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-ming-black dark:text-dark-text">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" 
                                class="input-paper w-full pl-10 pr-4 py-2 text-ming-black dark:text-dark-text placeholder-gray-500 dark:placeholder-gray-400"
                                placeholder="请输入密码" required>
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-ming-black dark:text-dark-text">
                                <i class="fa fa-eye"></i>
                            </button>
                        </div>
                        <p id="passwordError" class="hidden text-ming-red text-sm"></p>
                    </div>
                    
                    <!-- 记住我 -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="flex items-center h-5">
                                <input id="rememberMe" name="rememberMe" type="checkbox" 
                                    class="h-4 w-4 text-ming-red border-ming-gold dark:border-dark-border rounded focus:ring-ming-red">
                            </div>
                            <div class="text-sm">
                                <label for="rememberMe" class="text-ming-black dark:text-dark-text">
                                    记住我
                                </label>
                            </div>
                        </div>
                        <div>
                            <a href="#" class="text-ming-red dark:text-[#C0392B] hover:underline text-sm">
                                忘记密码？
                            </a>
                        </div>
                    </div>
                    
                    <!-- 提交按钮 -->
                    <div class="pt-4">
                        <button type="submit" class="seal-button w-full py-3 px-6 text-lg font-bold hover:bg-opacity-90 transition-all duration-300">
                            登录
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 注册链接 -->
        <div class="mt-8 text-center fade-in">
            <p class="text-ming-black dark:text-dark-text text-lg">
                还没有账号？ <a href="https://mingdynasty1.github.io/sign/up.html" class="text-ming-red dark:text-[#C0392B] hover:underline font-bold">立即注册</a>
            </p>
        </div>
        
        <!-- 登录状态提示 -->
        <div id="loginStatus" class="mt-8 text-center hidden">
            <div class="inline-flex items-center px-4 py-2 rounded-lg bg-ming-green dark:bg-[#3B5C44] text-ming-ivory">
                <i class="fa fa-check-circle mr-2"></i>
                <span id="statusMessage">登录成功！</span>
            </div>
        </div>
    </main>
    
    <!-- 底部装饰 -->
    <footer class="relative z-10 mt-16">
        <div class="relative h-16 w-full overflow-hidden">
            <div class="absolute -bottom-4 left-0 w-32 h-16 cloud-decoration transform rotate-12"></div>
            <div class="absolute -bottom-2 left-1/4 w-24 h-16 cloud-decoration"></div>
            <div class="absolute -bottom-4 right-1/4 w-32 h-16 cloud-decoration transform -rotate-12"></div>
            <div class="absolute -bottom-2 right-0 w-24 h-16 cloud-decoration transform -rotate-6"></div>
        </div>
        
        <div class="w-full h-16 bg-ming-red dark:bg-[#8B1A1A] shadow-lg flex items-center justify-center transition-colors duration-300">
            <div class="w-3/4 h-full border-t-4 border-ming-gold dark:border-dark-border flex items-center justify-center">
                <p class="text-ming-gold dark:text-[#C9B037] font-medium">
                    © 2013-2026 MingDynasty,Inc. 大明登录 | MingEmperor
                </p>
            </div>
        </div>
    </footer>
    
    <script>
        // Cookie 操作工具函数
        const CookieUtils = {
            // 设置 Cookie
            setCookie: function(name, value, days = 7) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                const expires = "expires=" + date.toUTCString();
                document.cookie = `${name}=${encodeURIComponent(value)}; ${expires}; path=/; SameSite=Lax`;
            },
            
            // 获取 Cookie
            getCookie: function(name) {
                const nameEQ = `${name}=`;
                const cookies = document.cookie.split(';');
                for(let i = 0; i < cookies.length; i++) {
                    let cookie = cookies[i];
                    while (cookie.charAt(0) === ' ') cookie = cookie.substring(1);
                    if (cookie.indexOf(nameEQ) === 0) {
                        return decodeURIComponent(cookie.substring(nameEQ.length));
                    }
                }
                return null;
            },
            
            // 删除 Cookie
            deleteCookie: function(name) {
                document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
            },
            
            // 清除所有认证相关 Cookie
            clearAuthCookies: function() {
                this.deleteCookie('username');
                this.deleteCookie('token');
            }
        };

        // 主题切换功能
        function initThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            // 检查本地存储中的主题偏好
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
            
            // 切换主题
            themeToggle.addEventListener('click', function() {
                html.classList.toggle('dark');
                const isDark = html.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        }

        // 密码显示/隐藏切换
        function initPasswordToggle() {
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }

        // 表单验证和登录处理
        function initLoginForm() {
            const form = document.getElementById('loginForm');
            const loginStatus = document.getElementById('loginStatus');
            const statusMessage = document.getElementById('statusMessage');
            
            // 检查是否已有登录信息
            const savedUsername = CookieUtils.getCookie('username');
            const savedToken = CookieUtils.getCookie('token');
            
            if (savedUsername && savedToken) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
                showStatus('检测到已保存的登录信息，可直接登录', 'info');
            }
            
            // 表单提交处理
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                
                // 清除之前的错误信息
                clearErrors();
                
                // 获取表单数据
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const rememberMe = document.getElementById('rememberMe').checked;
                
                // 简单验证
                let isValid = true;
                if (username.length < 3) {
                    showError('usernameError', '用户名至少需要3个字符');
                    isValid = false;
                }
                
                if (password.length < 6) {
                    showError('passwordError', '密码至少需要6个字符');
                    isValid = false;
                }
                
                // 模拟登录验证
                if (isValid) {
                    // 这里可以替换为真实的 API 请求
                    simulateLogin(username, password, rememberMe);
                }
            });
        }

        // 模拟登录请求
        function simulateLogin(username, password, rememberMe) {
            // 模拟网络延迟
            showStatus('正在验证身份...', 'info');
            
            setTimeout(() => {
                // 模拟登录成功（实际项目中替换为真实的后端验证）
                const token = generateRandomToken();
                
                // 设置 Cookie
                const expireDays = rememberMe ? 14 : 1; // 记住我则保存7天，否则保存1天
                CookieUtils.setCookie('username', username, expireDays);
                CookieUtils.setCookie('token', token, expireDays);
                
                // 显示成功信息
                showStatus(`欢迎回来，${username}！登录成功`, 'success');
                
                // 模拟跳转到首页
                setTimeout(() => {
                    alert('登录成功！即将跳转到系统首页');
                     window.location.href = 'https://mingdynasty1.github.io'; // 替换为实际的首页地址
                }, 1500);
            }, 1000);
        }

        // 生成随机 Token
        function generateRandomToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 32; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        // 显示状态提示
        function showStatus(message, type = 'success') {
            const loginStatus = document.getElementById('loginStatus');
            const statusMessage = document.getElementById('statusMessage');
            
            loginStatus.classList.remove('hidden');
            statusMessage.textContent = message;
            
            // 设置不同状态的样式
            if (type === 'error') {
                loginStatus.className = 'mt-8 text-center';
                loginStatus.innerHTML = `
                    <div class="inline-flex items-center px-4 py-2 rounded-lg bg-ming-red text-ming-ivory">
                        <i class="fa fa-exclamation-circle mr-2"></i>
                        <span>${message}</span>
                    </div>
                `;
            } else if (type === 'info') {
                loginStatus.className = 'mt-8 text-center';
                loginStatus.innerHTML = `
                    <div class="inline-flex items-center px-4 py-2 rounded-lg bg-ming-blue text-ming-ivory">
                        <i class="fa fa-info-circle mr-2"></i>
                        <span>${message}</span>
                    </div>
                `;
            } else {
                loginStatus.className = 'mt-8 text-center';
                loginStatus.innerHTML = `
                    <div class="inline-flex items-center px-4 py-2 rounded-lg bg-ming-green dark:bg-[#3B5C44] text-ming-ivory">
                        <i class="fa fa-check-circle mr-2"></i>
                        <span>${message}</span>
                    </div>
                `;
            }
        }

        // 显示错误信息
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
        }
        
        // 隐藏错误信息
        function hideError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.classList.add('hidden');
        }
        
        // 清除所有错误信息
        function clearErrors() {
            const errorElements = document.querySelectorAll('[id$="Error"]');
            errorElements.forEach(function(element) {
                element.classList.add('hidden');
            });
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            initThemeToggle();
            initPasswordToggle();
            initLoginForm();
        });
    </script>
</body>
</html>
