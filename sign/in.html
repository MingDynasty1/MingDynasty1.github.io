            background-color: #A62424;
            color: #FFFFF0;
            border: 2px solid #8B0000;
            border-radius: 4px;
            padding: 0.5rem 1rem;

            font-size: 1.2rem;
            transition: all 0.3s ease;

            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            cursor: pointer;
            width: 100%;

        .github-btn i {

            color: #999;
            font-size: 0.9rem;

            padding: 0.5rem;

        /* 加载动画 */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;

<body class="bg-[#FFFFF0] font-serif min-h-screen">
    <div class="fixed inset-0 z-0 opacity-10 pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-cover" style="background-image: url('https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/dfc94625bda34ad4bb5a98c64bf8e641~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202602011947131EC4ED518A5E6032BB25&rrcfp=f06b921b&x-expires=1772538471&x-signature=OteYZR8cuHdqZzFVLS5%2BEG12SUI%3D')"></div>
    </div>
    
    <div class="relative z-10 w-full">
        <div class="w-full h-16 bg-[#A62424] shadow-lg flex items-center justify-center">
            <div class="w-3/4 h-full border-b-4 border-[#D4AF37] flex items-center justify-center">
                <h1 class="text-3xl md:text-4xl text-[#D4AF37] font-bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                    大明王朝 - 用户登录
                </h1>
            </div>
        </div>
    </div>
    
    <main class="relative z-20 container mx-auto px-4 py-8 md:py-16">
        <div class="max-w-2xl mx-auto bg-[#FFFFF0] rounded-lg shadow-xl overflow-hidden border-2 border-[#D4AF37]">
            <div class="relative bg-[#A62424] py-6 px-8 text-center">
                <h2 class="text-2xl md:text-3xl text-[#D4AF37] font-bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                    登录账号
                </h2>
                <div class="absolute top-0 left-0 w-full h-2 bg-[#D4AF37]"></div>
                <div class="absolute bottom-0 left-0 w-full h-2 bg-[#D4AF37]"></div>
            </div>
            
            <div class="p-6 md:p-8 paper-texture">
                <!-- ===== Continue with GitHub ===== -->
                <button onclick="socialLogin('github')" id="githubLoginBtn" class="github-btn">
                    <i class="fa fa-github"></i> 
                    <span id="githubBtnText">Continue with GitHub</span>
                    <span id="githubLoading" class="spinner" style="display:none;"></span>
                </button>

                <div class="divider">或使用邮箱登录</div>

                <!-- ===== 邮箱登录表单 ===== -->
                <form id="loginForm" class="space-y-6">
                    <div class="space-y-2">
                        <label for="email" class="block text-[#2C2C2C] text-lg">
                            电子邮箱 <span class="text-[#A62424]">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#2C2C2C]">
                                <i class="fa fa-envelope"></i>
                            </span>
                            <input type="email" id="email" name="email" 
                                class="input-paper pl-10 pr-4 py-2 text-[#2C2C2C]"
                                placeholder="请输入注册邮箱" required>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label for="password" class="block text-[#2C2C2C] text-lg">
                            密码 <span class="text-[#A62424]">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#2C2C2C]">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" 
                                class="input-paper pl-10 pr-4 py-2 text-[#2C2C2C]"
                                placeholder="请输入密码" required>
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-[#2C2C2C]">
                                <i class="fa fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="loginError" class="hidden text-[#A62424] text-sm text-center"></div>
                    
                    <div class="pt-4">
                        <button type="submit" id="emailLoginBtn" class="seal-button w-full py-3 px-6 text-lg font-bold">
                            登 录
                        </button>
                    </div>
                </form>
                <!-- 在 </form> 之后，<div class="mt-6 text-center"> 之前添加 -->
                <div class="text-right mt-2">
                    <a href="https://mingdynasty1.github.io/sign/re.html" class="text-sm text-[#A62424] hover:underline law-link">
                        🔑 忘记密码？
                    </a>
                </div>
                <div class="mt-6 text-center">
                    <p class="text-[#2C2C2C]">
                        还没有账号？ <a href="https://mingdynasty1.github.io/sign/up.html" class="law-link">立即注册</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="relative z-10 mt-16">
        <div class="w-full h-16 bg-[#A62424] shadow-lg flex items-center justify-center">
            <div class="w-3/4 h-full border-t-4 border-[#D4AF37] flex items-center justify-center">
                <p class="text-[#D4AF37] font-medium">
                    © 2013-2026 MingDynasty,Inc. 大明登录 | MingEmperor
                </p>
            </div>
        </div>
    </footer>
    
    <script>
        // ============================================================
        // GitHub 第三方登录
        // ============================================================
        async function socialLogin(provider) {
            const btn = document.getElementById('githubLoginBtn');
            const btnText = document.getElementById('githubBtnText');
            const loading = document.getElementById('githubLoading');
            const errorEl = document.getElementById('loginError');
            
            // 显示加载状态
            btn.style.opacity = '0.7';
            btnText.textContent = '正在跳转到 GitHub...';
            loading.style.display = 'inline-block';
            errorEl.classList.add('hidden');
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: 'https://mingdynasty1.github.io/'
                    }
                });
                
                if (error) throw error;
                // Supabase 会自动跳转到 GitHub 授权页面
                // 这里不需要额外操作
                
            } catch (error) {
                // 恢复按钮
                btn.style.opacity = '1';
                btnText.textContent = 'Continue with GitHub';
                loading.style.display = 'none';
                
                errorEl.textContent = '登录失败：' + error.message;
                errorEl.classList.remove('hidden');
            }
        }

        // ============================================================
        // 邮箱密码登录
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });

            const form = document.getElementById('loginForm');
            const errorEl = document.getElementById('loginError');
            const emailLoginBtn = document.getElementById('emailLoginBtn');

            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                if (!email || !password) {
                    errorEl.textContent = '请填写完整信息';
                    errorEl.classList.remove('hidden');
                    return;
                }

                errorEl.classList.add('hidden');
                emailLoginBtn.disabled = true;
                emailLoginBtn.textContent = '登录中...';

                const result = await loginUser(email, password);
                
                emailLoginBtn.disabled = false;
                emailLoginBtn.textContent = '登 录';
                
                if (result.success) {
                    window.location.href = 'https://mingdynasty1.github.io/';
                } else {
                    errorEl.textContent = '登录失败：' + (result.error || '请检查邮箱和密码');
                    errorEl.classList.remove('hidden');
                }
            });
        });
    </script>
</body>
