<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置新密码 | MingDynasty</title>
    <link rel="icon" href="https://MingDynasty1.github.io/000000000000000000.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://mingdynasty1.github.io/supabase-client.js"></script>
    
    <style>
        * { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        :root {
            --bg-color: #fdf7f0;
            --text-color: #2C2C2C;
            --card-bg: #ffffff;
            --border-color: #D4AF37;
            --accent-color: #A62424;
            --gold-color: #D4AF37;
            --shadow-color: rgba(0, 0, 0, 0.12);
            --input-bg: #FFFFF0;
        }
        .dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --border-color: #D4AF37;
            --accent-color: #ff4444;
            --gold-color: #D4AF37;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --input-bg: #2a2a2a;
        }
        body {
            font-family: 'SimSun', '宋体', 'serif';
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .container-custom { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header-bar {
            background: linear-gradient(to right, #A62424, #8B0000);
            padding: 16px 0;
            text-align: center;
            border-bottom: 4px solid var(--gold-color);
        }
        .dark-mode .header-bar { background: linear-gradient(to right, #6a1a1a, #4a0000); }
        .header-bar h1 {
            color: var(--gold-color);
            font-size: 1.8rem;
            letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px 28px;
            box-shadow: 0 8px 30px var(--shadow-color);
            border: 2px solid var(--border-color);
            margin-top: 30px;
        }
        .card-title {
            color: var(--accent-color);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 4px;
            font-family: 'KaiTi', '楷体', serif;
        }
        .card-subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
        }
        .form-group label .required { color: var(--accent-color); }
        .input-paper {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 14px;
            font-family: 'SimSun', '宋体', serif;
            font-size: 1rem;
            color: var(--text-color);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.06);
            box-sizing: border-box;
        }
        .input-paper:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: inset 0 2px 6px rgba(166,36,36,0.15), 0 0 0 3px rgba(166,36,36,0.08);
        }
        .seal-button {
            width: 100%;
            background: linear-gradient(to bottom, #A62424, #8B0000);
            color: #FFFFF0;
            border: 2px solid var(--gold-color);
            border-radius: 6px;
            padding: 12px 20px;
            font-family: 'KaiTi', '楷体', serif;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #6a0000;
        }
        .seal-button:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #6a0000; }
        .seal-button:active { transform: translateY(2px); box-shadow: 0 2px 0 #6a0000; }
        .seal-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 16px;
            display: none;
        }
        .message.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .dark-mode .message.success { background: #1e3a2a; color: #8fdf9f; border-color: #2d6a3f; }
        .dark-mode .message.error { background: #3a1e1e; color: #ff8a8a; border-color: #6a2d2d; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .theme-toggle-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--gold-color); }
        input:checked + .slider:before { transform: translateX(20px); }
        .footer-bar {
            text-align: center;
            padding: 16px 0;
            margin-top: 30px;
            border-top: 2px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-color);
            opacity: 0.5;
        }
        @media (max-width: 480px) {
            .card { padding: 20px 16px; }
            .header-bar h1 { font-size: 1.3rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>🏮 大明王朝 · 重设密码</h1>
    </div>

    <div class="container-custom">

        <div class="theme-toggle-wrapper">
            <span><i class="fa fa-moon"></i></span>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
            <span><i class="fa fa-sun"></i></span>
        </div>

        <div class="card">

            <h2 class="card-title">🔑 设置新密码</h2>
            <p class="card-subtitle">
                请设置你的新御用密码，<br>
                长度不少于 6 位。
            </p>

            <div id="messageBox" class="message"></div>

            <form id="resetPasswordForm">

                <div class="form-group">
                    <label for="newPassword">
                        🔒 新密码 <span class="required">*</span>
                    </label>
                    <input type="password" id="newPassword" class="input-paper" 
                           placeholder="至少 6 位" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        🔒 确认新密码 <span class="required">*</span>
                    </label>
                    <input type="password" id="confirmPassword" class="input-paper" 
                           placeholder="请再次输入" required minlength="6">
                </div>

                <button type="submit" id="resetPwdBtn" class="seal-button">
                    📜 确认重置
                </button>

            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="https://mingdynasty1.github.io/sign/in.html" 
                   style="color: var(--accent-color); text-decoration: none; font-size: 0.95rem;">
                    <i class="fa fa-arrow-left"></i> 返回登录
                </a>
            </div>

        </div>

        <div class="footer-bar">
            © 2013-2026 MingDynasty,Inc. 设置新密码 | 开局一个碗，结局一根绳
        </div>

    </div>

    <script>
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('resetPwdDarkMode') === 'true') {
            document.body.classList.add('dark-mode');
            themeToggle.checked = true;
        }
        themeToggle.addEventListener('change', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('resetPwdDarkMode', this.checked);
        });

        // 重置密码
        const form = document.getElementById('resetPasswordForm');
        const msgBox = document.getElementById('messageBox');
        const btn = document.getElementById('resetPwdBtn');

        function showMsg(msg, type) {
            msgBox.textContent = msg;
            msgBox.className = 'message ' + type;
            clearTimeout(msgBox._timer);
            msgBox._timer = setTimeout(() => { msgBox.className = 'message'; }, 5000);
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            if (newPwd.length < 6) {
                showMsg('密码至少需要 6 位', 'error');
                return;
            }
            if (newPwd !== confirmPwd) {
                showMsg('两次输入的密码不一致', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 更新中...';

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPwd
                });

                if (error) throw error;

                showMsg('✅ 密码重置成功！请使用新密码登录', 'success');
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                // 3秒后跳转到登录页
                setTimeout(() => {
                    window.location.href = 'https://mingdynasty1.github.io/sign/in.html';
                }, 3000);

            } catch (error) {
                let msg = error.message;
                if (msg.includes('session')) {
                    msg = '会话已过期，请重新从邮件链接进入';
                }
                showMsg('❌ ' + msg, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '📜 确认重置';
        });
    </script>

</body>
</html>
