    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B0000', // 深红色
                        secondary: '#DAA520', // 金色
                        accent: '#006400', // 深绿色
                        dark: '#2F4F4F', // 暗青色
                        light: '#F5F5DC', // 米色
                    },
                    fontFamily: {
                        song: ['SimSun', 'STSong', 'serif'], // 仿宋体
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            }
            .text-shadow-lg {
                text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.8);
            }
            .bg-pattern {
                background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%238B0000" /><path d="M50,0 C77.6,0 100,22.4 100,50 C100,77.6 77.6,100 50,100 C22.4,100 0,77.6 0,50 C0,22.4 22.4,0 50,0 Z M50,10 C27.9,10 10,27.9 10,50 C10,72.1 27.9,90 50,90 C72.1,90 90,72.1 90,50 C90,27.9 72.1,10 50,10 Z" fill="%23DAA520" fill-opacity="0.2" /></svg>');
            }
        }
    </style>
    <style>
        body {
            overflow: hidden;
            touch-action: none;
            background-color: #000;
            font-family: 'SimSun', 'STSong', serif;
        }
        
        /* 加载动画 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #8B0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-wheel {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(218, 165, 32, 0.3);
            border-radius: 50%;
            border-top-color: #DAA520;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 游戏标题动画 */
        .game-title {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* 按钮悬停效果 */
        .game-button {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .game-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s;
        }
        
        .game-button:hover:before {
            left: 100%;
        }
        
        .game-button:active {
            transform: scale(0.95);
        }
        
        /* 角色选择卡片 */
        .character-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .character-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .character-card.selected {
            border: 4px solid #DAA520;
            transform: scale(1.05);
        }
        
        /* 游戏结束动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        /* 金币收集动画 */
        @keyframes coin-collect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .coin-collect {
            animation: coin-collect 0.3s ease-out forwards;
        }
        
        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #DAA520;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-black">
    <!-- 加载屏幕 -->

    <!-- 设置菜单 -->

    <!-- 游戏界面 -->

        <canvas id="game-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
        
        <!-- 游戏UI -->
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-10">
            <div class="flex items-center">
                <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/e8ca57e7985d42b38b5e14f2ddc10507~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552580&x-signature=ULDeUvs0VspQpehoiF1vxD%2F4Fig%3D" alt="金币" class="w-8 h-8 mr-2">

        <!-- 暂停按钮 -->

    <!-- 暂停菜单 -->
    <div id="pause-menu" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center z-50">
        <h2 class="text-4xl font-bold text-secondary mb-8 text-shadow font-song">游戏暂停</h2>
        <div class="flex flex-col gap-4 w-64">
            <button id="resume-button" class="game-button bg-primary hover:bg-red-800 text-white py-3 px-6 rounded-lg text-xl font-song border-2 border-secondary">继续游戏</button>
            <button id="restart-button" class="game-button bg-dark hover:bg-teal-900 text-white py-3 px-6 rounded-lg text-xl font-song border-2 border-secondary">重新开始</button>

        </div>

    <!-- 游戏结束菜单 -->
    <div id="game-over-menu" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center z-50">
        <h2 class="text-4xl font-bold text-primary mb-4 text-shadow font-song">游戏结束</h2>
        <p class="text-2xl text-light mb-2 font-song">您的得分</p>
        <p id="final-score" class="text-5xl font-bold text-secondary mb-8 text-shadow-lg font-song">0</p>
        <div class="flex flex-col gap-4 w-64">
            <button id="play-again-button" class="game-button bg-primary hover:bg-red-800 text-white py-3 px-6 rounded-lg text-xl font-song border-2 border-secondary">再玩一次</button>
            <button id="back-to-menu-button" class="game-button bg-dark hover:bg-teal-900 text-white py-3 px-6 rounded-lg text-xl font-song border-2 border-secondary">返回菜单</button>
        </div>
    </div>

    <script>
        // 游戏资源
        const gameResources = {
            // 角色
            characters: {
               锦衣卫: {
                    image: 'https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/05d2329eb2e649db88ae44f90785047a~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552562&x-signature=htsrinNft66MDP7ljZtcapkoaFI%3D',
                    width: 100,
                    height: 150,
                    speed: 5,
                    jumpHeight: 15,
                    slideDuration: 500
                },
                书生: {
                    image: 'https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/274a7db54e3d4d68a4840929990b2236~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552580&x-signature=YTGJa7vzuYnNE7WlKfJZ64FLF4I%3D',
                    width: 100,
                    height: 150,
                    speed: 4,
                    jumpHeight: 18,
                    slideDuration: 400
                },
                绣女: {
                    image: 'placeholder.png', // 暂时使用占位符
                    width: 100,
                    height: 150,
                    speed: 4.5,
                    jumpHeight: 16,
                    slideDuration: 450,
                    flyDuration: 2000 // 特殊能力：短暂飞行
                }
            },
            
            // 障碍物
            obstacles: {
                马车: {
                    image: 'https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/dee36ee536b84161b85665646b3b183c~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552564&x-signature=rFm2eLyzuIsmd3EuWtuKqU8Kld8%3D',
                    width: 120,
                    height: 100,
                    type: 'high' // 需要跳跃
                },
                石碑: {
                    image: 'https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/2b3f9796e29e4e0b8d8af4b4759c6a90~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552581&x-signature=YHy1ry5bCXW3gDGsgQKouXcbgcI%3D',
                    width: 80,
                    height: 150,
                    type: 'high' // 需要跳跃
                },
                摊位: {
                    image: 'placeholder.png', // 暂时使用占位符
                    width: 100,
                    height: 80,
                    type: 'low' // 需要滑行
                }
            },
            
            // 道具
            collectibles: {
                金币: {
                    image: 'https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/e8ca57e7985d42b38b5e14f2ddc10507~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552580&x-signature=ULDeUvs0VspQpehoiF1vxD%2F4Fig%3D',
                    width: 40,
                    height: 40,
                    value: 10
                },
                宝石: {
                    image: 'placeholder.png', // 暂时使用占位符
                    width: 30,
                    height: 30,
                    value: 50
                }
            },
            
            // 背景
            backgrounds: {
                京城: {
                    image: 'https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/b045c9969b62433c9aeadf61812df928~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260308170228123889175B4B8AD35E81&rrcfp=f06b921b&x-expires=1775552562&x-signature=QkqMATvtRZ3AwsJyIpWdpkoIG6U%3D',
                    speed: 1
                },
                长城: {
                    image: 'placeholder.png', // 暂时使用占位符
                    speed: 1.2
                },
                水乡: {
                    image: 'placeholder.png', // 暂时使用占位符
                    speed: 0.9
                }
            }
        };

        // 游戏状态
        let gameState = {
            currentScreen: 'start', // start, characters, settings, game, pause, gameOver
            selectedCharacter: '锦衣卫',
            score: 0,
            lives: 3,
            highScore: localStorage.getItem('mingDynastyHighScore') || 0,
            soundVolume: 80,
            musicEnabled: true,
            difficulty: 'normal',
            isGameRunning: false,
            isPaused: false,
            loadedResources: 0,
            totalResources: 0
        };

        // 计算需要加载的资源总数
        function countResources() {
            let count = 0;
            
            // 计算角色资源
            for (const char in gameResources.characters) {
                if (gameResources.characters[char].image !== 'placeholder.png') {
                    count++;
                }
            }
            
            // 计算障碍物资源
            for (const obstacle in gameResources.obstacles) {
                if (gameResources.obstacles[obstacle].image !== 'placeholder.png') {
                    count++;
                }
            }
            
            // 计算道具资源
            for (const collectible in gameResources.collectibles) {
                if (gameResources.collectibles[collectible].image !== 'placeholder.png') {
                    count++;
                }
            }
            
            // 计算背景资源
            for (const background in gameResources.backgrounds) {
                if (gameResources.backgrounds[background].image !== 'placeholder.png') {
                    count++;
                }
            }
            
            return count;
        }

        // 预加载图片资源
        function preloadImages() {
            gameState.totalResources = countResources();
            gameState.loadedResources = 0;
            
            // 预加载角色图片
            for (const char in gameResources.characters) {
                if (gameResources.characters[char].image !== 'placeholder.png') {
                    const img = new Image();
                    img.src = gameResources.characters[char].image;
                    img.onload = () => {
                        gameState.loadedResources++;
                        checkLoadingComplete();
                    };
                    img.onerror = () => {
                        gameState.loadedResources++;
                        console.error(`Failed to load image: ${gameResources.characters[char].image}`);
                        checkLoadingComplete();
                    };
                }
            }
            
            // 预加载障碍物图片
            for (const obstacle in gameResources.obstacles) {
                if (gameResources.obstacles[obstacle].image !== 'placeholder.png') {
                    const img = new Image();
                    img.src = gameResources.obstacles[obstacle].image;
                    img.onload = () => {
                        gameState.loadedResources++;
                        checkLoadingComplete();
                    };
                    img.onerror = () => {
                        gameState.loadedResources++;
                        console.error(`Failed to load image: ${gameResources.obstacles[obstacle].image}`);
                        checkLoadingComplete();
                    };
                }
            }
            
            // 预加载道具图片
            for (const collectible in gameResources.collectibles) {
                if (gameResources.collectibles[collectible].image !== 'placeholder.png') {
                    const img = new Image();
                    img.src = gameResources.collectibles[collectible].image;
                    img.onload = () => {
                        gameState.loadedResources++;
                        checkLoadingComplete();
                    };
                    img.onerror = () => {
                        gameState.loadedResources++;
                        console.error(`Failed to load image: ${gameResources.collectibles[collectible].image}`);
                        checkLoadingComplete();
                    };
                }
            }
            
            // 预加载背景图片
            for (const background in gameResources.backgrounds) {
                if (gameResources.backgrounds[background].image !== 'placeholder.png') {
                    const img = new Image();
                    img.src = gameResources.backgrounds[background].image;
                    img.onload = () => {
                        gameState.loadedResources++;
                        checkLoadingComplete();
                    };
                    img.onerror = () => {
                        gameState.loadedResources++;
                        console.error(`Failed to load image: ${gameResources.backgrounds[background].image}`);
                        checkLoadingComplete();
                    };
                }
            }
        }

        // 检查资源加载是否完成
        function checkLoadingComplete() {
            if (gameState.loadedResources >= gameState.totalResources) {
                setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('hidden');
                    showScreen('start');
                }, 500);
            }
        }

        // 显示指定屏幕
        function showScreen(screenId) {
            // 隐藏所有屏幕
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('characters-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
            
            // 显示指定屏幕
            switch (screenId) {
                case 'start':
                    document.getElementById('start-menu').classList.remove('hidden');
                    break;
                case 'characters':
                    document.getElementById('characters-menu').classList.remove('hidden');
                    break;
                case 'settings':
                    document.getElementById('settings-menu').classList.remove('hidden');
                    break;
                case 'game':
                    document.getElementById('game-container').classList.remove('hidden');
                    break;
                case 'pause':
                    document.getElementById('pause-menu').classList.remove('hidden');
                    break;
                case 'gameOver':
                    document.getElementById('game-over-menu').classList.remove('hidden');
                    break;
            }
            
            gameState.currentScreen = screenId;
        }

        // 初始化游戏
        function initGame() {
            // 预加载图片资源
            preloadImages();
            
            // 初始化菜单按钮事件
            document.getElementById('play-button').addEventListener('click', () => {
                startGame();
            });
            
            document.getElementById('characters-button').addEventListener('click', () => {
                showScreen('characters');
            });
            
            document.getElementById('settings-button').addEventListener('click', () => {
                showScreen('settings');
            });
            
            document.getElementById('back-from-characters').addEventListener('click', () => {
                showScreen('start');
            });
            
            document.getElementById('back-from-settings').addEventListener('click', () => {
                // 保存设置
                gameState.soundVolume = document.getElementById('sound-volume').value;
                gameState.musicEnabled = document.getElementById('music-toggle').checked;
                gameState.difficulty = document.getElementById('difficulty').value;
                
                showScreen('start');
            });
            
            // 角色选择事件
            const characterCards = document.querySelectorAll('.character-card');
            characterCards.forEach(card => {
                card.addEventListener('click', () => {
                    // 移除所有选中状态
                    characterCards.forEach(c => c.classList.remove('selected'));
                    // 添加当前选中状态
                    card.classList.add('selected');
                    // 更新选中的角色
                    gameState.selectedCharacter = card.querySelector('h3').textContent;
                });
            });
            
            // 游戏控制按钮事件
            document.getElementById('pause-button').addEventListener('click', () => {
                pauseGame();
            });
            
            document.getElementById('resume-button').addEventListener('click', () => {
                resumeGame();
            });
            
            document.getElementById('restart-button').addEventListener('click', () => {
                restartGame();
            });
            
            document.getElementById('exit-button').addEventListener('click', () => {
                exitGame();
            });
            
            document.getElementById('play-again-button').addEventListener('click', () => {
                restartGame();
            });
            
            document.getElementById('back-to-menu-button').addEventListener('click', () => {
                exitGame();
            });
            
            // 触摸控制事件
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;
            
            document.addEventListener('touchstart', (e) => {
                if (gameState.currentScreen === 'game' && !gameState.isPaused) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            }, false);
            
            document.addEventListener('touchend', (e) => {
                if (gameState.currentScreen === 'game' && !gameState.isPaused) {
                    touchEndX = e.changedTouches[0].clientX;
                    touchEndY = e.changedTouches[0].clientY;
                    
                    handleSwipe();
                }
            }, false);
            
            // 键盘控制事件
            document.addEventListener('keydown', (e) => {
                if (gameState.currentScreen === 'game' && !gameState.isPaused) {
                    switch (e.key) {
                        case 'ArrowUp':
                            player.jump();
                            break;
                        case 'ArrowDown':
                            player.slide();
                            break;
                        case 'ArrowLeft':
                            player.moveLeft();
                            break;
                        case 'ArrowRight':
                            player.moveRight();
                            break;
                        case ' ':
                            player.jump();
                            break;
                    }
                } else if (gameState.currentScreen === 'game' && e.key === 'Escape') {
                    pauseGame();
                }
            });
            
            // 处理滑动手势
            function handleSwipe() {
                const dx = touchEndX - touchStartX;
                const dy = touchStartY - touchEndY;
                
                // 水平滑动
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                    if (dx > 0) {
                        player.moveRight();
                    } else {
                        player.moveLeft();
                    }
                }
                // 垂直滑动
                else if (Math.abs(dy) > 50) {
                    if (dy > 0) {
                        player.jump();
                    } else {
                        player.slide();
                    }
                }
            }
        }

        // 游戏对象
        let canvas, ctx;
        let player, obstacles = [], collectibles = [];
        let gameLoop, lastTime = 0;
        let backgroundX = 0;
        let spawnTimer = 0;
        let spawnInterval = 1500; // 障碍物生成间隔（毫秒）
        let scoreMultiplier = 1;
        let currentBackground = '京城';
        let backgroundChangeScore = 5000; // 每得5000分切换背景
        
        // 玩家类
        class Player {
            constructor() {
                const charData = gameResources.characters[gameState.selectedCharacter];
                this.image = new Image();
                this.image.src = charData.image;
                this.width = charData.width;
                this.height = charData.height;
                this.x = 100;
                this.y = 0; // 将在初始化时设置
                this.speed = charData.speed;
                this.jumpHeight = charData.jumpHeight;
                this.slideDuration = charData.slideDuration;
                this.isJumping = false;
                this.isSliding = false;
                this.jumpVelocity = 0;
                this.slideTimer = 0;
                this.lane = 1; // 0: 左, 1: 中, 2: 右
                this.laneWidth = 0; // 将在初始化时设置
                this.flyDuration = charData.flyDuration || 0;
                this.isFlying = false;
                this.flyTimer = 0;
            }
            
            init(canvasHeight) {
                this.y = canvasHeight - this.height - 50;
                this.laneWidth = canvas.width / 3;
            }
            
            jump() {
                if (!this.isJumping && !this.isSliding && !this.isFlying) {
                    this.isJumping = true;
                    this.jumpVelocity = this.jumpHeight;
                    playSound('jump');
                }
            }
            
            slide() {
                if (!this.isJumping && !this.isSliding && !this.isFlying) {
                    this.isSliding = true;
                    this.slideTimer = this.slideDuration;
                    playSound('slide');
                }
            }
            
            fly() {
                if (this.flyDuration > 0 && !this.isJumping && !this.isSliding && !this.isFlying) {
                    this.isFlying = true;
                    this.flyTimer = this.flyDuration;
                    playSound('fly');
                }
            }
            
            moveLeft() {
                if (this.lane > 0 && !this.isSliding) {
                    this.lane--;
                    this.x = this.lane * this.laneWidth + (this.laneWidth - this.width) / 2;
                    playSound('move');
                }
            }
            
            moveRight() {
                if (this.lane < 2 && !this.isSliding) {
                    this.lane++;
                    this.x = this.lane * this.laneWidth + (this.laneWidth - this.width) / 2;
                    playSound('move');
                }
            }
            
            update(deltaTime, canvasHeight) {
                // 更新位置
                if (this.isJumping) {
                    this.y -= this.jumpVelocity;
                    this.jumpVelocity -= 0.5;
                    
                    if (this.y >= canvasHeight - this.height - 50) {
                        this.y = canvasHeight - this.height - 50;
                        this.isJumping = false;
                    }
                }
                
                if (this.isSliding) {
                    this.slideTimer -= deltaTime;
                    
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                    }
                }
                
                if (this.isFlying) {
                    this.flyTimer -= deltaTime;
                    
                    if (this.flyTimer <= 0) {
                        this.isFlying = false;
                        this.y = canvasHeight - this.height - 50;
                    }
                }
                
                // 更新角色在当前车道的位置
                this.x = this.lane * this.laneWidth + (this.laneWidth - this.width) / 2;
            }
            
            draw(ctx) {
                // 根据角色状态调整绘制高度
                let drawY = this.y;
                let drawHeight = this.height;
                
                if (this.isSliding) {
                    drawHeight = this.height * 0.6;
                    drawY = this.y + this.height * 0.4;
                }
                
                ctx.drawImage(this.image, this.x, drawY, this.width, drawHeight);
            }
            
            checkCollision(object) {
                // 调整碰撞检测区域
                let hitboxX = this.x + this.width * 0.2;
                let hitboxY = this.y;
                let hitboxWidth = this.width * 0.6;
                let hitboxHeight = this.height;
                
                if (this.isSliding) {
                    hitboxHeight = this.height * 0.6;
                }
                
                return (
                    hitboxX < object.x + object.width &&
                    hitboxX + hitboxWidth > object.x &&
                    hitboxY < object.y + object.height &&
                    hitboxY + hitboxHeight > object.y
                );
            }
        }

        // 障碍物类
        class Obstacle {
            constructor(type, x, y) {
                const obstacleData = gameResources.obstacles[type];
                this.image = new Image();
                this.image.src = obstacleData.image;
                this.width = obstacleData.width;
                this.height = obstacleData.height;
                this.x = x;
                this.y = y;
                this.type = obstacleData.type;
                this.speed = 0; // 将在生成时设置
            }
            
            update(deltaTime) {
                this.x -= this.speed * deltaTime / 16;
            }
            
            draw(ctx) {
                ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
            }
        }

        // 道具类
        class Collectible {
            constructor(type, x, y) {
                const collectibleData = gameResources.collectibles[type];
                this.image = new Image();
                this.image.src = collectibleData.image;
                this.width = collectibleData.width;
                this.height = collectibleData.height;
                this.x = x;
                this.y = y;
                this.value = collectibleData.value;
                this.speed = 0; // 将在生成时设置
                this.collected = false;
                this.animationTimer = 0;
            }
            
            update(deltaTime) {
                this.x -= this.speed * deltaTime / 16;
                
                if (this.collected) {
                    this.animationTimer += deltaTime;
                }
            }
            
            draw(ctx) {
                if (!this.collected) {
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                } else if (this.animationTimer < 300) {
                    // 收集动画
                    const scale = 1 + this.animationTimer / 300;
                    const alpha = 1 - this.animationTimer / 300;
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(
                        this.image, 
                        this.x - this.width * (scale - 1) / 2, 
                        this.y - this.height * (scale - 1) / 2, 
                        this.width * scale, 
                        this.height * scale
                    );
                    ctx.restore();
                }
            }
            
            collect() {
                if (!this.collected) {
                    this.collected = true;
                    playSound('collect');
                    createParticles(this.x + this.width / 2, this.y + this.height / 2);
                    return this.value;
                }
                return 0;
            }
        }

        // 创建粒子效果
        function createParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                
                document.body.appendChild(particle);
                
                // 动画
                let timer = 0;
                const animate = () => {
                    timer += 16;
                    const alpha = 1 - timer / 500;
                    
                    if (alpha <= 0) {
                        document.body.removeChild(particle);
                        return;
                    }
                    
                    particle.style.left = `${parseFloat(particle.style.left) + vx}px`;
                    particle.style.top = `${parseFloat(particle.style.top) + vy}px`;
                    particle.style.opacity = alpha;
                    
                    requestAnimationFrame(animate);
                };
                
                animate();
            }
        }

        // 开始游戏
        function startGame() {
            showScreen('game');
            
            // 初始化画布
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            
            // 设置画布尺寸
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 重置游戏状态
            gameState.score = 0;
            gameState.lives = 3;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = gameState.lives;
            
            // 初始化玩家
            player = new Player();
            player.init(canvas.height);
            
            // 重置游戏对象
            obstacles = [];
            collectibles = [];
            backgroundX = 0;
            spawnTimer = 0;
            
            // 根据难度设置游戏参数
            switch (gameState.difficulty) {
                case 'easy':
                    spawnInterval = 2000;
                    scoreMultiplier = 1;
                    break;
                case 'normal':
                    spawnInterval = 1500;
                    scoreMultiplier = 1;
                    break;
                case 'hard':
                    spawnInterval = 1000;
                    scoreMultiplier = 1.5;
                    break;
            }
            
            // 开始游戏循环
            gameState.isGameRunning = true;
            gameState.isPaused = false;
            lastTime = performance.now();
            gameLoop = requestAnimationFrame(updateGame);
            
            // 播放背景音乐
            if (gameState.musicEnabled) {
                playMusic('background');
            }
        }

        // 调整画布尺寸
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // 如果游戏正在运行，更新玩家位置
            if (player) {
                player.init(canvas.height);
            }
        }

        // 更新游戏
        function updateGame(timestamp) {
            if (!gameState.isPaused) {
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;
                
                // 清空画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 更新背景
                updateBackground(deltaTime);
                
                // 更新玩家
                player.update(deltaTime, canvas.height);
                
                // 生成障碍物和道具
                spawnTimer += deltaTime;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    spawnObstacle();
                    
                    // 有30%的几率生成道具
                    if (Math.random() < 0.3) {
                        spawnCollectible();
                    }
                }
                
                // 更新障碍物
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].update(deltaTime);
                    
                    // 检查是否与玩家碰撞
                    if (player.checkCollision(obstacles[i])) {
                        handleCollision();
                        obstacles.splice(i, 1);
                        continue;
                    }
                    
                    // 移除屏幕外的障碍物
                    if (obstacles[i].x + obstacles[i].width < 0) {
                        obstacles.splice(i, 1);
                    }
                }
                
                // 更新道具
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    collectibles[i].update(deltaTime);
                    
                    // 检查是否被玩家收集
                    if (player.checkCollision(collectibles[i])) {
                        const value = collectibles[i].collect();
                        gameState.score += Math.round(value * scoreMultiplier);
                        document.getElementById('score').textContent = gameState.score;
                        
                        // 检查是否需要切换背景
                        if (gameState.score >= backgroundChangeScore) {
                            changeBackground();
                            backgroundChangeScore += 5000;
                        }
                    }
                    
                    // 移除屏幕外或已收集的道具
                    if (collectibles[i].x + collectibles[i].width < 0 || 
                        (collectibles[i].collected && collectibles[i].animationTimer >= 300)) {
                        collectibles.splice(i, 1);
                    }
                }
                
                // 增加分数（随时间）
                gameState.score += Math.round(0.1 * scoreMultiplier);
                document.getElementById('score').textContent = gameState.score;
                
                // 绘制玩家
                player.draw(ctx);
                
                // 绘制障碍物
                obstacles.forEach(obstacle => {
                    obstacle.draw(ctx);
                });
                
                // 绘制道具
                collectibles.forEach(collectible => {
                    collectible.draw(ctx);
                });
            }
            
            if (gameState.isGameRunning) {
                gameLoop = requestAnimationFrame(updateGame);
            }
        }

        // 更新背景
        function updateBackground(deltaTime) {
            const bgData = gameResources.backgrounds[currentBackground];
            const bgImage = new Image();
            bgImage.src = bgData.image;
            
            // 计算背景滚动速度
            const speed = bgData.speed * deltaTime / 32;
            backgroundX += speed;
            
            // 绘制背景
            const bgWidth = canvas.width;
            const bgHeight = canvas.height;
            
            // 绘制多张背景图片以实现无缝滚动
            for (let i = 0; i <= Math.ceil(canvas.width / bgWidth) + 1; i++) {
                ctx.drawImage(
                    bgImage, 
                    (i * bgWidth - backgroundX) % (bgWidth * 2), 
                    0, 
                    bgWidth, 
                    bgHeight
                );
            }
        }

        // 切换背景
        function changeBackground() {
            const backgrounds = Object.keys(gameResources.backgrounds);
            const currentIndex = backgrounds.indexOf(currentBackground);
            const nextIndex = (currentIndex + 1) % backgrounds.length;
            currentBackground = backgrounds[nextIndex];
            
            playSound('backgroundChange');
        }

        // 生成障碍物
        function spawnObstacle() {
            const obstacleTypes = Object.keys(gameResources.obstacles);
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            
            // 随机选择车道
            const lane = Math.floor(Math.random() * 3);
            const laneWidth = canvas.width / 3;
            const x = canvas.width;
            const y = canvas.height - gameResources.obstacles[type].height - 50;
            
            const obstacle = new Obstacle(type, x, y);
            obstacle.speed = 5 + Math.random() * 3; // 随机速度
            obstacles.push(obstacle);
        }

        // 生成道具
        function spawnCollectible() {
            const collectibleTypes = Object.keys(gameResources.collectibles);
            const type = collectibleTypes[Math.floor(Math.random() * collectibleTypes.length)];
            
            // 随机选择车道
            const lane = Math.floor(Math.random() * 3);
            const laneWidth = canvas.width / 3;
            const x = canvas.width;
            
            // 随机高度（在空中）
            const minY = canvas.height - 300;
            const maxY = canvas.height - 150;
            const y = minY + Math.random() * (maxY - minY);
            
            const collectible = new Collectible(type, x, y);
            collectible.speed = 5 + Math.random() * 2; // 随机速度
            collectibles.push(collectible);
        }

        // 处理碰撞
        function handleCollision() {
            gameState.lives--;
            document.getElementById('lives').textContent = gameState.lives;
            
            // 震动效果
            canvas.classList.add('shake');
            setTimeout(() => {
                canvas.classList.remove('shake');
            }, 500);
            
            playSound('collision');
            
            // 检查游戏是否结束
            if (gameState.lives <= 0) {
                gameOver();
            }
        }

        // 暂停游戏
        function pauseGame() {
            if (gameState.isGameRunning) {
                gameState.isPaused = true;
                showScreen('pause');
                pauseMusic('background');
            }
        }

        // 恢复游戏
        function resumeGame() {
            if (gameState.isGameRunning) {
                gameState.isPaused = false;
                showScreen('game');
                lastTime = performance.now();
                
                if (gameState.musicEnabled) {
                    resumeMusic('background');
                }
            }
        }

        // 重新开始游戏
        function restartGame() {
            cancelAnimationFrame(gameLoop);
            startGame();
        }

        // 退出游戏
        function exitGame() {
            cancelAnimationFrame(gameLoop);
            stopMusic('background');
            showScreen('start');
        }

        // 游戏结束
        function gameOver() {
            gameState.isGameRunning = false;
            cancelAnimationFrame(gameLoop);
            
            // 更新最高分
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('mingDynastyHighScore', gameState.highScore);
            }
            
            // 显示最终分数
            document.getElementById('final-score').textContent = gameState.score;
            
            // 显示游戏结束菜单
            showScreen('gameOver');
            
            // 停止背景音乐
            stopMusic('background');
            playSound('gameOver');
        }

        // 音频控制函数（模拟）
        function playSound(soundName) {
            // 实际项目中，这里应该播放真实的音效
            console.log(`Playing sound: ${soundName}`);
        }
        
        function playMusic(musicName) {
            // 实际项目中，这里应该播放真实的背景音乐
            console.log(`Playing music: ${musicName}`);
        }
        
        function pauseMusic(musicName) {
            // 实际项目中，这里应该暂停真实的背景音乐
            console.log(`Pausing music: ${musicName}`);
        }
        
        function resumeMusic(musicName) {
            // 实际项目中，这里应该恢复真实的背景音乐
            console.log(`Resuming music: ${musicName}`);
        }
       
        function stopMusic(musicName) {
            // 实际项目中，这里应该停止真实的背景音乐
            console.log(`Stopping music: ${musicName}`);
        }

        // 初始化游戏
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
    </script>
</body>
