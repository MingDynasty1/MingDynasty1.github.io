            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #8B0000;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            cursor: pointer;

        .seal-button-secondary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #3a5a43; }

        .law-link { color: #A62424; font-weight: 500; text-decoration: none; }
        .law-link:hover { text-decoration: underline; }
        body {
            font-family: 'serif', 'SimSun', 'FangSong';
            background-color: #FFFFF0;
        }
        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }
        .dark-mode .paper-texture {
            background-color: #1e1e1e;
            background-image: none;
        }
        .dark-mode .input-paper {
            background-color: #2a2a2a;
            color: #ffffff;
            border-color: #D4AF37;
        }
        .dark-mode .input-paper::placeholder {
            color: #888;
        }
        .dark-mode .bg-\[\#FFFFF0\] {
            background-color: #1e1e1e;
        }
        .dark-mode .text-\[\#2C2C2C\] {
            color: #ffffff;
        }
        .dark-mode .border-\[\#D4AF37\] {
            border-color: #D4AF37;
        }
        .dark-mode .bg-white {
            background-color: #1e1e1e;
        }
        .dark-mode .text-gray-700 {
            color: #ddd;
        }
        .dark-mode .text-gray-600 {
            color: #bbb;
        }
        .dark-mode .bg-gray-50 {
            background-color: #1a1a1a;
        }
        .dark-mode .border-gray-200 {

<body>
    <div class="fixed inset-0 z-0 opacity-10 pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-cover" style="background-image: url('https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/dfc94625bda34ad4bb5a98c64bf8e641~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202602011947131EC4ED518A5E6032BB25&rrcfp=f06b921b&x-expires=1772538471&x-signature=OteYZR8cuHdqZzFVLS5%2BEG12SUI%3D')"></div>
    </div>
    
    <div class="relative z-10 w-full">
        <div class="w-full h-16 bg-[#A62424] shadow-lg flex items-center justify-center">
            <div class="w-3/4 h-full border-b-4 border-[#D4AF37] flex items-center justify-center">
                <h1 class="text-3xl md:text-4xl text-[#D4AF37] font-bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                    大明王朝 - 用户设置
                </h1>
            </div>
        </div>
    </div>
    
    <main class="relative z-20 container mx-auto px-4 py-8 md:py-12">
        <!-- 明暗切换 -->
        <div class="text-right mb-4">
            <button id="themeToggle" class="text-[#A62424] text-sm border border-[#D4AF37] px-4 py-2 rounded hover:bg-[#D4AF37] hover:text-white transition">
                <i class="fa fa-moon"></i> 切换暗色模式
            </button>
        </div>
        
        <div class="max-w-2xl mx-auto bg-[#FFFFF0] rounded-lg shadow-xl overflow-hidden border-2 border-[#D4AF37]">
            <div class="relative bg-[#A62424] py-6 px-8 text-center">
                <h2 class="text-2xl md:text-3xl text-[#D4AF37] font-bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                    ⚙️ 用户设置
                </h2>
                <div class="absolute top-0 left-0 w-full h-2 bg-[#D4AF37]"></div>
                <div class="absolute bottom-0 left-0 w-full h-2 bg-[#D4AF37]"></div>
            </div>
            
            <div class="p-6 md:p-8 paper-texture" id="settingsContent">
                <!-- 加载中 -->
                <div id="loadingState" class="text-center py-8 text-gray-600">
                    <i class="fa fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">加载用户信息...</p>
                </div>
                
                <!-- 用户信息（登录后显示） -->
                <div id="userInfoState" style="display: none;">
                    <!-- 用户头像和基本信息 -->
                    <div class="flex items-center space-x-4 mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                        <div id="avatar" class="w-16 h-16 rounded-full bg-[#A62424] flex items-center justify-center text-white text-2xl font-bold">
                            U
                        </div>
                        <div>
                            <div id="displayName" class="text-xl font-bold text-[#2C2C2C]">用户名</div>
                            <div id="displayEmail" class="text-sm text-gray-600">邮箱</div>
                            <div id="displayUid" class="text-xs text-gray-500 font-mono">UID: ---</div>
                        </div>
                    </div>
                    
                    <!-- 修改资料 -->
                    <div class="border-t border-[#D4AF37] pt-6 mt-4">
                        <h3 class="text-lg font-bold text-[#A62424] mb-4"><i class="fa fa-user"></i> 修改个人资料</h3>
                        <form id="profileForm" class="space-y-4">
                            <div>
                                <label class="block text-[#2C2C2C] text-sm font-bold mb-1">用户名</label>
                                <input type="text" id="editUsername" class="input-paper">
                            </div>
                            <div>
                                <label class="block text-[#2C2C2C] text-sm font-bold mb-1">个人简介</label>
                                <textarea id="editBio" rows="3" class="input-paper" placeholder="写下你的个人简介..."></textarea>
                            </div>
                            <button type="submit" class="seal-button-secondary w-full">
                                <i class="fa fa-save"></i> 保存资料
                            </button>
                            <div id="profileMsg" class="text-sm text-center mt-2"></div>
                        </form>
                    </div>
                    
                    <!-- 修改密码 -->
                    <div class="border-t border-[#D4AF37] pt-6 mt-4">
                        <h3 class="text-lg font-bold text-[#A62424] mb-4"><i class="fa fa-key"></i> 修改密码</h3>
                        <form id="passwordForm" class="space-y-4">
                            <div>
                                <label class="block text-[#2C2C2C] text-sm font-bold mb-1">新密码</label>
                                <input type="password" id="newPassword" class="input-paper" placeholder="至少6位" required>
                            </div>
                            <div>
                                <label class="block text-[#2C2C2C] text-sm font-bold mb-1">确认新密码</label>
                                <input type="password" id="confirmNewPassword" class="input-paper" placeholder="再次输入" required>
                            </div>
                            <button type="submit" class="seal-button w-full">
                                <i class="fa fa-lock"></i> 更新密码
                            </button>
                            <div id="passwordMsg" class="text-sm text-center mt-2"></div>
                        </form>
                    </div>
                    
                    <!-- 返回主页 -->
                    <div class="border-t border-[#D4AF37] pt-6 mt-4 text-center">
                        <a href="https://mingdynasty1.github.io/" class="law-link">
                            <i class="fa fa-arrow-left"></i> 返回主页
                        </a>
                    </div>
                </div>
                
                <!-- 未登录 -->
                <div id="notLoggedInState" style="display: none;" class="text-center py-8">
                    <i class="fa fa-exclamation-circle text-4xl text-[#A62424]"></i>
                    <p class="text-lg text-[#2C2C2C] mt-4">你还没有登录</p>
                    <div class="mt-4 space-x-4">
                        <a href="https://mingdynasty1.github.io/sign/in.html" class="seal-button inline-block">登录</a>
                        <a href="https://mingdynasty1.github.io/sign/up.html" class="seal-button-secondary inline-block">注册</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="relative z-10 mt-16">
        <div class="w-full h-16 bg-[#A62424] shadow-lg flex items-center justify-center">
            <div class="w-3/4 h-full border-t-4 border-[#D4AF37] flex items-center justify-center">
                <p class="text-[#D4AF37] font-medium">
                    © 2013-2026 MingDynasty,Inc. 用户设置 | MingEmperor
                </p>
            </div>
        </div>
    </footer>
    
    <script>
        let currentUser = null;
        let isDark = false;
        
        // 主题切换
        document.getElementById('themeToggle').addEventListener('click', function() {
            isDark = !isDark;
            document.body.classList.toggle('dark-mode', isDark);
            this.innerHTML = isDark ? '<i class="fa fa-sun"></i> 切换亮色模式' : '<i class="fa fa-moon"></i> 切换暗色模式';
            localStorage.setItem('settingsDarkMode', isDark);
        });
        
        // 恢复主题
        if (localStorage.getItem('settingsDarkMode') === 'true') {
            isDark = true;
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').innerHTML = '<i class="fa fa-sun"></i> 切换亮色模式';
        }
        
        async function loadUser() {
            const loading = document.getElementById('loadingState');
            const userInfo = document.getElementById('userInfoState');
            const notLogged = document.getElementById('notLoggedInState');
            
            try {
                currentUser = await getCurrentUser();
                
                if (currentUser) {
                    loading.style.display = 'none';
                    userInfo.style.display = 'block';
                    notLogged.style.display = 'none';
                    
                    const profile = currentUser.profile || {};
                    const username = profile.username || currentUser.user_metadata?.username || '用户';
                    const email = currentUser.email || '未设置邮箱';
                    const uid = currentUser.id ? currentUser.id.slice(0, 8) : '未知';
                    const bio = profile.bio || '';
                    
                    document.getElementById('avatar').textContent = username.charAt(0).toUpperCase();
                    document.getElementById('displayName').textContent = username;
                    document.getElementById('displayEmail').textContent = email;
                    document.getElementById('displayUid').textContent = 'UID: ' + uid;
                    document.getElementById('editUsername').value = username;
                    document.getElementById('editBio').value = bio;
                    
                } else {
                    loading.style.display = 'none';
                    userInfo.style.display = 'none';
                    notLogged.style.display = 'block';
                }
            } catch (e) {
                loading.style.display = 'none';
                userInfo.style.display = 'none';
                notLogged.style.display = 'block';
                console.error('加载用户失败:', e);
            }
        }
        
        // 修改资料
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msg = document.getElementById('profileMsg');
            
            if (!currentUser) {
                msg.textContent = '请先登录';
                msg.style.color = '#A62424';
                return;
            }
            
            const username = document.getElementById('editUsername').value.trim();
            const bio = document.getElementById('editBio').value.trim();
            
            if (!username || username.length < 2) {
                msg.textContent = '用户名至少2个字符';
                msg.style.color = '#A62424';
                return;
            }
            
            const result = await updateProfile(currentUser.id, {
                username: username,
                bio: bio || '暂无简介'
            });
            
            if (result.success) {
                msg.textContent = '✅ 资料更新成功！';
                msg.style.color = '#4B6C54';
                // 刷新显示
                currentUser.profile.username = username;
                currentUser.profile.bio = bio || '暂无简介';
                document.getElementById('displayName').textContent = username;
                document.getElementById('avatar').textContent = username.charAt(0).toUpperCase();
                setTimeout(() => { msg.textContent = ''; }, 3000);
            } else {
                msg.textContent = '❌ 更新失败：' + result.error;
                msg.style.color = '#A62424';
            }
        });
        
        // 修改密码
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msg = document.getElementById('passwordMsg');
            
            if (!currentUser) {
                msg.textContent = '请先登录';
                msg.style.color = '#A62424';
                return;
            }
            
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmNewPassword').value;
            
            if (newPwd.length < 6) {
                msg.textContent = '密码至少6位';
                msg.style.color = '#A62424';
                return;
            }
            
            if (newPwd !== confirmPwd) {
                msg.textContent = '两次密码不一致';
                msg.style.color = '#A62424';
                return;
            }
            
            const result = await updatePassword(newPwd);
            
            if (result.success) {
                msg.textContent = '✅ 密码修改成功！';
                msg.style.color = '#4B6C54';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';
                setTimeout(() => { msg.textContent = ''; }, 3000);
            } else {
                msg.textContent = '❌ 修改失败：' + result.error;
                msg.style.color = '#A62424';
            }
        });
        
        document.addEventListener('DOMContentLoaded', loadUser);
    </script>
</body>
</html>
